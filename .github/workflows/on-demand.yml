name: Run Aave V4 Spec

on:
  repository_dispatch:
    types: [on-demand-test]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication
  checks: write

concurrency:
  group: ${{ github.workflow }}-tests-on-demand
  cancel-in-progress: true

jobs:   
  run-tests:
    name: All Tests
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'staging' }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      ETHEREUM_TENDERLY_FORK_ID: ${{ vars.ETHEREUM_TENDERLY_FORK_ID }}
      ETHEREUM_TENDERLY_PUBLIC_RPC: ${{ vars.ETHEREUM_TENDERLY_PUBLIC_RPC }}
      ETHEREUM_TENDERLY_ADMIN_RPC: ${{ secrets.ETHEREUM_TENDERLY_ADMIN_RPC }}
      ETHEREUM_TENDERLY_BLOCKEXPLORER: ${{ vars.ETHEREUM_TENDERLY_BLOCKEXPLORER }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Repository
        uses: ./.github/actions/setup

      - name: Build
        shell: bash
        run: pnpm build

      - name: Run tests
        run: pnpm spec
      
      - name: Configure AWS credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Playwright report to S3
        if: always()
        run: |
          if [ -d "reports" ]; then
            # Upload all files except .gz files
            aws s3 sync reports/ s3://${{ secrets.S3_BUCKET_NAME }}/aave-v4-sdk/${{ github.run_id }}/ \
              --delete \
              --exclude "*.gz"

            # Upload .gz files with correct headers so browsers decompress them transparently
            find reports/ -name "*.gz" | while read gz_file; do
              relative_path="${gz_file#reports/}"
              aws s3 cp "$gz_file" \
                "s3://${{ secrets.S3_BUCKET_NAME }}/aave-v4-sdk/${{ github.run_id }}/${relative_path}" \
                --content-type "application/json" \
                --content-encoding "gzip"
            done

            echo "Aave V4 SDK report uploaded to: s3://${{ secrets.S3_BUCKET_NAME }}/aave-v4-sdk/${{ github.run_id }}/"
          else
            echo "Aave V4 SDK report directory not found"
          fi

      - name: Publish test report to GitHub
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: reports/test-results.xml
          check_name: Aave V4 Spec Test Report
      
      - name: Publish results
        if: always()
        run: pnpm publish:results
