name: Run Aave V4 Spec

on:
  repository_dispatch:
    types: [on-demand-test]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication
  checks: write

concurrency:
  group: ${{ github.workflow }}-tests-on-demand
  cancel-in-progress: true

jobs:   
  run-tests:
    name: All Tests
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'staging' }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      ETHEREUM_TENDERLY_FORK_ID: ${{ vars.ETHEREUM_TENDERLY_FORK_ID }}
      ETHEREUM_TENDERLY_PUBLIC_RPC: ${{ vars.ETHEREUM_TENDERLY_PUBLIC_RPC }}
      ETHEREUM_TENDERLY_ADMIN_RPC: ${{ secrets.ETHEREUM_TENDERLY_ADMIN_RPC }}
      ETHEREUM_TENDERLY_BLOCKEXPLORER: ${{ vars.ETHEREUM_TENDERLY_BLOCKEXPLORER }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Repository
        uses: ./.github/actions/setup

      - name: Build
        shell: bash
        run: pnpm build

      - name: Run tests
        run: pnpm spec
      
      - name: Configure AWS credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}


      - name: Upload Vitest report to S3
        if: always()
        run: |
          if [ -d "reports" ]; then

            # 1. Patch index.html FIRST (before sync), so the patched version is
            #    what gets uploaded — not the original with the .gz reference.
            #    sed strips ".gz" from window.METADATA_PATH so the browser fetches
            #    "html.meta.json" (the decompressed file we upload in step 2).
            index_file="reports/index.html"
            if [ -f "$index_file" ]; then
              sed -i 's|window\.METADATA_PATH="\([^"]*\)\.gz"|window.METADATA_PATH="\1"|g' "$index_file"
            fi

            # 2. Upload all non-.gz files (including the patched index.html)
            aws s3 sync reports/ s3://${{ secrets.S3_BUCKET_NAME }}/aave-v4-sdk/${{ github.run_id }}/ \
              --delete \
              --exclude "*.gz"

            # 3. Decompress .gz files and upload as plain JSON.
            find reports/ -name "*.gz" | while read gz_file; do
              decompressed="${gz_file%.gz}"
              gunzip -c "$gz_file" > "$decompressed"
              relative_path="${decompressed#reports/}"
              aws s3 cp "$decompressed" \
                "s3://${{ secrets.S3_BUCKET_NAME }}/aave-v4-sdk/${{ github.run_id }}/${relative_path}" \
                --content-type "application/json"
              rm "$decompressed"
            done

            echo "Aave V4 SDK report uploaded to: https://${{ secrets.S3_BUCKET_NAME }}/aave-v4-sdk/${{ github.run_id }}/index.html"
          else
            echo "Aave V4 SDK report directory not found"
          fi

      - name: Publish test report to GitHub
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: reports/test-results.xml
          check_name: Aave V4 Spec Test Report
      
      - name: Publish results
        if: always()
        run: pnpm publish:results
