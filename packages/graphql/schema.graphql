type HubAssetInterestRateModelPoint {
  """The utilization rate at this point on the curve"""
  utilizationRate: PercentNumber!

  """The variable borrow rate at this utilization level"""
  borrowRate: PercentNumber!

  """
  The supply rate at this utilization level (borrow_rate × utilization × (1 − fee))
  """
  supplyRate: PercentNumber!

  """
  The absolute liquidity distance from the current state to reach this utilization level.
  Always a positive value representing the token amount that needs to move.
  At the asset's current utilization, this value is zero.
  """
  liquidityDistance: Erc20Amount!
}

